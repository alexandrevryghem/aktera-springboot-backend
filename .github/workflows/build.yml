---
name: Build 🧪
on:
  push:
    branches:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build 🧪
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Set up JDK ☕
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run tests 🧪
        run: mvn test

  deploy-to-github:
    name: GitHub
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && vars.CONTAINER_REGISTRY == 'github' }}
    uses: ./.github/workflows/deploy-to-github.yml
    secrets: inherit
